version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quranStart-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - api_node_modules:/app/node_modules
      - ./backend/uploads:/app/uploads
    command: npm run start:dev
    environment:
      - MONGODB_URI=mongodb+srv://meryemli:cat%40hhh123@e-market-api.atzgzsh.mongodb.net/?appName=quran-start
      - PORT=3000
      - JWT_SECRET=your_super_secret_key
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    command: npm run dev -- -H 0.0.0.0 -p 3001
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quranStart-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=https://quran-start-1.onrender.com
      - API_URL=http://api:3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:7
    container_name: quranStart-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

volumes:
  api_node_modules:
  mongo_data:
  frontend_node_modules:

networks:
  app-network:
    driver: bridge